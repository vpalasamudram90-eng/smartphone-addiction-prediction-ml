{% extends 'users/userbase.html' %}
{% load static %}

{% block contents %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smartphone Addiction Assessment</title>

<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: 30px auto;
    padding: 30px;
    background-color: #ffffff;
    border-radius: 15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

h1 {
    color: #667eea;
    text-align: center;
    font-size: 28px;
}

.subtitle {
    text-align: center;
    color: #666;
    margin-bottom: 30px;
    font-style: italic;
}

.section {
    margin-top: 25px;
    padding: 20px;
    background-color: #f8f9fa;
    border-left: 5px solid #667eea;
    border-radius: 8px;
}

.section h3 {
    color: #667eea;
    margin-bottom: 12px;
}

label {
    font-weight: 600;
    display: block;
    margin-top: 12px;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    margin-top: 30px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    font-weight: bold;
    color: white;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    cursor: pointer;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(102,126,234,0.4);
}
</style>
</head>

<body>
<div class="container">
<h1>📱 Smartphone Addiction Assessment</h1>
<p class="subtitle">Enter your daily smartphone usage details</p>

<form method="post" action="{% url 'prediction' %}">
{% csrf_token %}

<!-- BASIC -->
<div class="section">
<h3>👤 Basic</h3>

<label>Age</label>
<input type="number" name="age" required>
</div>

<!-- APP USAGE -->
<div class="section">
<h3>📲 App Usage (Hours / Day)</h3>

<label>Whatsapp</label>
<input type="number" step="0.01" name="whatsapp" required>

<label>Instagram</label>
<input type="number" step="0.01" name="instagram" required>

<label>Snapchat</label>
<input type="number" step="0.01" name="snapchat" required>

<label>Telegram</label>
<input type="number" step="0.01" name="telegram" required>

<label>Facebook</label>
<input type="number" step="0.01" name="facebook" required>

<label>TikTok</label>
<input type="number" step="0.01" name="tiktok" required>

<label>WeChat</label>
<input type="number" step="0.01" name="wechat" required>

<label>Twitter</label>
<input type="number" step="0.01" name="twitter" required>

<label>LinkedIn</label>
<input type="number" step="0.01" name="linkedin" required>

<label>BeReal</label>
<input type="number" step="0.01" name="bereal" required>

<label>Messages</label>
<input type="number" step="0.01" name="messages" required>
</div>

<!-- USAGE METRICS -->
<div class="section">
<h3>📊 Usage Metrics</h3>

<label>Total Social Media Screen Time (hrs)</label>
<input type="number" step="0.01" name="total_time" required>


</div>

<button type="submit">🔍 Analyze Addiction</button>
</form>
</div>
</body>
</html>
{% endblock %}
