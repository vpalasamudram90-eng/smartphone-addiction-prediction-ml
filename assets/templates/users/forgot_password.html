<form method="POST">
    {% csrf_token %}
    <h2>Forgot Password</h2>
    <input type="email" name="email" required placeholder="Enter Registered Email">
    <button type="submit">Send OTP</button>
</form>
{% if messages %}
    {% for message in messages %}
        <div class="alert alert-warning">{{ message }}</div>
    {% endfor %}
{% endif %}
